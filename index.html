<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Document Classifier</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo .logo-icon {
      width: 36px;
      height: 36px;
      background: #2b6cb0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
    }
    .header-logo h1 {
      font-size: 17px;
      font-weight: 600;
      color: #1a202c;
    }
    .header-logo span {
      font-size: 12px;
      color: #718096;
      display: block;
      font-weight: 400;
    }
    .header-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #718096;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 6px 14px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #48bb78;
    }
    .status-dot.offline { background: #fc8181; }

    /* Main layout */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }
    .stat-label {
      font-size: 12px;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 600;
      color: #2b6cb0;
    }
    .stat-sub {
      font-size: 12px;
      color: #a0aec0;
      margin-top: 2px;
    }

    /* Two column layout */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    /* Cards */
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: #1a202c;
    }
    .card-header i { color: #2b6cb0; font-size: 16px; }
    .card-body { padding: 1.25rem; }

    /* Model switcher */
    .model-switcher {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .model-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1.5px solid #e2e8f0;
      background: #fff;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }
    .model-btn:hover { border-color: #90cdf4; background: #ebf8ff; }
    .model-btn.active { border-color: #2b6cb0; background: #ebf8ff; }
    .model-btn.loading { opacity: 0.6; cursor: wait; }
    .model-btn-left { display: flex; align-items: center; gap: 10px; }
    .model-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: #bee3f8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #2b6cb0;
    }
    .model-name { font-size: 14px; font-weight: 500; color: #1a202c; }
    .model-acc { font-size: 12px; color: #718096; }
    .model-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #c6f6d5;
      color: #276749;
      font-weight: 500;
    }
    .model-badge.mid { background: #fefcbf; color: #744210; }
    .model-badge.low { background: #fed7d7; color: #742a2a; }
    .active-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2b6cb0;
    }

    /* Upload area */
    .upload-area {
      border: 2px dashed #bee3f8;
      border-radius: 10px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f7fafc;
      position: relative;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: #2b6cb0;
      background: #ebf8ff;
    }
    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-icon { font-size: 32px; color: #90cdf4; margin-bottom: 10px; }
    .upload-title { font-size: 15px; font-weight: 500; color: #2d3748; margin-bottom: 4px; }
    .upload-sub { font-size: 13px; color: #a0aec0; }

    /* Preview */
    .preview-container {
      margin-top: 1rem;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      position: relative;
    }
    .preview-container img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      display: block;
    }
    .preview-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .file-info {
      padding: 8px 12px;
      background: #f7fafc;
      font-size: 12px;
      color: #718096;
      display: flex;
      justify-content: space-between;
    }

    /* Predict button */
    .predict-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 12px;
      background: #2b6cb0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .predict-btn:hover { background: #2c5282; }
    .predict-btn:disabled { background: #a0aec0; cursor: not-allowed; }

    /* Result card */
    .result-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
    }
    .result-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .result-header h2 { font-size: 15px; font-weight: 600; }
    .result-header i { color: #2b6cb0; }
    .result-body { padding: 1.25rem; }

    .result-class {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.25rem;
    }
    .result-icon {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      background: #ebf8ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #2b6cb0;
    }
    .result-class-name {
      font-size: 22px;
      font-weight: 600;
      color: #1a202c;
    }
    .result-model-used {
      font-size: 12px;
      color: #718096;
    }

    .confidence-section { margin-bottom: 1.25rem; }
    .confidence-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .confidence-label span:first-child { color: #718096; }
    .confidence-label span:last-child { font-weight: 600; color: #2b6cb0; }
    .confidence-bar-track {
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
    }
    .confidence-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: #2b6cb0;
      transition: width 0.6s ease;
    }
    .confidence-bar-fill.high { background: #48bb78; }
    .confidence-bar-fill.medium { background: #ed8936; }
    .confidence-bar-fill.low { background: #fc8181; }
    .confidence-level-badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 10px;
    }
    .confidence-level-badge.very-high { background: #c6f6d5; color: #276749; }
    .confidence-level-badge.high { background: #c6f6d5; color: #276749; }
    .confidence-level-badge.medium { background: #fefcbf; color: #744210; }
    .confidence-level-badge.low { background: #fed7d7; color: #742a2a; }

    .all-probs { margin-top: 1rem; }
    .prob-label { font-size: 13px; color: #718096; margin-bottom: 8px; }
    .prob-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .prob-name { font-size: 13px; min-width: 110px; color: #2d3748; }
    .prob-track {
      flex: 1;
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
    }
    .prob-fill {
      height: 100%;
      border-radius: 3px;
      background: #90cdf4;
      transition: width 0.6s ease;
    }
    .prob-fill.winner { background: #2b6cb0; }
    .prob-pct { font-size: 12px; color: #718096; min-width: 42px; text-align: right; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #a0aec0;
    }
    .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; }
    .empty-state p { font-size: 14px; }

    /* History */
    .history-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-top: 1.5rem;
      overflow: hidden;
    }
    .history-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .history-header h2 { font-size: 15px; font-weight: 600; }
    .history-header i { color: #2b6cb0; margin-right: 8px; }
    .clear-btn {
      font-size: 12px;
      color: #718096;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
    }
    .clear-btn:hover { background: #f7fafc; }
    .history-table { width: 100%; border-collapse: collapse; }
    .history-table th {
      background: #f7fafc;
      font-size: 12px;
      color: #718096;
      padding: 8px 12px;
      text-align: left;
      font-weight: 500;
      border-bottom: 1px solid #e2e8f0;
    }
    .history-table td {
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid #f7fafc;
      color: #2d3748;
    }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table tr:hover td { background: #f7fafc; }
    .class-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
    }
    .class-pill.aadhar { background: #ebf8ff; color: #2b6cb0; }
    .class-pill.pan { background: #f0fff4; color: #276749; }
    .class-pill.marksheet { background: #fffaf0; color: #744210; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #2d3748;
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .content-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .main { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const API_BASE = "http://127.0.0.1:8001";

    const MODELS = [
      { name: "MobileNetV2", accuracy: "97.33%", badge: "Best",   badgeClass: "",    icon: "fa-bolt" },
      { name: "ResNet50",    accuracy: "72.33%", badge: "Medium", badgeClass: "mid", icon: "fa-layer-group" },
      { name: "VGG16",       accuracy: "—",      badge: "Train first", badgeClass: "low", icon: "fa-microchip" },
    ];

    function getClassInfo(cls) {
      if (!cls) return { icon: "fa-file", pillClass: "" };
      const c = cls.toLowerCase();
      if (c.includes("aadhar")) return { icon: "fa-id-card", pillClass: "aadhar" };
      if (c.includes("pan"))    return { icon: "fa-credit-card", pillClass: "pan" };
      if (c.includes("mark"))   return { icon: "fa-graduation-cap", pillClass: "marksheet" };
      return { icon: "fa-file", pillClass: "" };
    }

    function getConfidenceClass(level) {
      if (!level) return "";
      const l = level.toLowerCase().replace(" ", "-");
      return l;
    }

    function getBarClass(confidence) {
      if (confidence >= 80) return "high";
      if (confidence >= 60) return "medium";
      return "low";
    }

    function App() {
      const [activeModel, setActiveModel]   = useState("MobileNetV2");
      const [switching, setSwitching]        = useState(false);
      const [serverStatus, setServerStatus] = useState("checking");
      const [file, setFile]                  = useState(null);
      const [preview, setPreview]            = useState(null);
      const [predicting, setPredicting]      = useState(false);
      const [result, setResult]              = useState(null);
      const [history, setHistory]            = useState([]);
      const [dragover, setDragover]          = useState(false);
      const [toast, setToast]                = useState(null);
      const [stats, setStats]                = useState({ predictions: 0, accuracy: "97.33%", params: "2.4M", classes: 3 });
      const fileInputRef = useRef(null);

      const showToast = (msg, icon = "fa-check-circle") => {
        setToast({ msg, icon });
        setTimeout(() => setToast(null), 3000);
      };

      // Health check on load
      useEffect(() => {
        fetch(`${API_BASE}/health`)
          .then(r => r.json())
          .then(() => setServerStatus("online"))
          .catch(() => setServerStatus("offline"));
      }, []);

      const handleSwitchModel = async (modelName) => {
        if (modelName === activeModel || switching) return;
        setSwitching(true);
        try {
          const res = await fetch(`${API_BASE}/switch-model/${modelName}`, { method: "POST" });
          const data = await res.json();
          if (data.status === "success") {
            setActiveModel(modelName);
            const m = MODELS.find(x => x.name === modelName);
            setStats(s => ({ ...s, accuracy: m?.accuracy || "—" }));
            showToast(`Switched to ${modelName}`, "fa-check-circle");
            setResult(null);
          } else {
            showToast(data.detail || "Switch failed", "fa-exclamation-circle");
          }
        } catch {
          showToast("Server unreachable", "fa-exclamation-circle");
        } finally {
          setSwitching(false);
        }
      };

      const handleFileChange = (f) => {
        if (!f) return;
        setFile(f);
        setResult(null);
        const reader = new FileReader();
        reader.onload = e => setPreview(e.target.result);
        reader.readAsDataURL(f);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setDragover(false);
        const f = e.dataTransfer.files[0];
        if (f) handleFileChange(f);
      };

      const handlePredict = async () => {
        if (!file) return;
        setPredicting(true);
        setResult(null);
        try {
          const formData = new FormData();
          formData.append("file", file);
          const res = await fetch(`${API_BASE}/predict`, { method: "POST", body: formData });
          const data = await res.json();
          if (data.status === "success") {
            setResult(data);
            const entry = {
              id:        Date.now(),
              filename:  data.filename,
              predicted: data.predicted_class,
              confidence: data.confidence,
              model:     data.model_used,
              time:      new Date().toLocaleTimeString(),
            };
            setHistory(h => [entry, ...h.slice(0, 9)]);
            setStats(s => ({ ...s, predictions: s.predictions + 1 }));
            showToast(`Classified as ${data.predicted_class}`, "fa-check-circle");
          } else {
            showToast(data.detail || "Prediction failed", "fa-exclamation-circle");
          }
        } catch {
          showToast("Server unreachable. Is FastAPI running?", "fa-exclamation-circle");
        } finally {
          setPredicting(false);
        }
      };

      const removeFile = () => {
        setFile(null);
        setPreview(null);
        setResult(null);
        if (fileInputRef.current) fileInputRef.current.value = "";
      };

      const classInfo = result ? getClassInfo(result.predicted_class) : null;

      return (
        <>
          {/* Header */}
          <header className="header">
            <div className="header-logo">
              <div className="logo-icon"><i className="fa fa-brain"></i></div>
              <div>
                <h1>AI Document Classifier</h1>
                <span>MPOnline AIML Internship Project</span>
              </div>
            </div>
            <div className="header-status">
              <div className={`status-dot ${serverStatus === "online" ? "" : "offline"}`}></div>
              {serverStatus === "online" ? "Server online" : serverStatus === "offline" ? "Server offline" : "Checking..."}
            </div>
          </header>

          <main className="main">
            {/* Stats */}
            <div className="stats-row">
              <div className="stat-card">
                <div className="stat-label">Active model</div>
                <div className="stat-value" style={{fontSize:"16px",paddingTop:"4px"}}>{activeModel}</div>
                <div className="stat-sub">Transfer learning</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Val accuracy</div>
                <div className="stat-value">{stats.accuracy}</div>
                <div className="stat-sub">On augmented dataset</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Predictions</div>
                <div className="stat-value">{stats.predictions}</div>
                <div className="stat-sub">This session</div>
              </div>
              <div className="stat-card">
                <div className="stat-label">Classes</div>
                <div className="stat-value">{stats.classes}</div>
                <div className="stat-sub">Aadhar · PAN · Marksheet</div>
              </div>
            </div>

            {/* Main grid */}
            <div className="content-grid">

              {/* Left col */}
              <div style={{display:"flex", flexDirection:"column", gap:"1.5rem"}}>

                {/* Model switcher */}
                <div className="card">
                  <div className="card-header">
                    <i className="fa fa-sliders-h"></i>
                    <h2>Select model</h2>
                  </div>
                  <div className="card-body">
                    <div className="model-switcher">
                      {MODELS.map(m => (
                        <button
                          key={m.name}
                          className={`model-btn ${activeModel === m.name ? "active" : ""} ${switching ? "loading" : ""}`}
                          onClick={() => handleSwitchModel(m.name)}
                        >
                          <div className="model-btn-left">
                            <div className="model-icon"><i className={`fa ${m.icon}`}></i></div>
                            <div>
                              <div className="model-name">{m.name}</div>
                              <div className="model-acc">Accuracy: {m.accuracy}</div>
                            </div>
                          </div>
                          <div style={{display:"flex", alignItems:"center", gap:"8px"}}>
                            <span className={`model-badge ${m.badgeClass}`}>{m.badge}</span>
                            {activeModel === m.name && <div className="active-indicator"></div>}
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Upload */}
                <div className="card">
                  <div className="card-header">
                    <i className="fa fa-upload"></i>
                    <h2>Upload document</h2>
                  </div>
                  <div className="card-body">
                    {!file ? (
                      <div
                        className={`upload-area ${dragover ? "dragover" : ""}`}
                        onDragOver={e => { e.preventDefault(); setDragover(true); }}
                        onDragLeave={() => setDragover(false)}
                        onDrop={handleDrop}
                      >
                        <input
                          ref={fileInputRef}
                          type="file"
                          accept="image/*"
                          onChange={e => handleFileChange(e.target.files[0])}
                        />
                        <div className="upload-icon"><i className="fa fa-cloud-upload-alt"></i></div>
                        <div className="upload-title">Drop image here or click to browse</div>
                        <div className="upload-sub">Supports JPG, PNG, BMP, WEBP</div>
                      </div>
                    ) : (
                      <div className="preview-container">
                        <img src={preview} alt="Preview" />
                        <button className="preview-remove" onClick={removeFile}>
                          <i className="fa fa-times"></i>
                        </button>
                        <div className="file-info">
                          <span>{file.name}</span>
                          <span>{(file.size / 1024).toFixed(1)} KB</span>
                        </div>
                      </div>
                    )}

                    <button
                      className="predict-btn"
                      onClick={handlePredict}
                      disabled={!file || predicting}
                    >
                      {predicting
                        ? <><span className="spinner"></span> Classifying...</>
                        : <><i className="fa fa-search"></i> Classify document</>
                      }
                    </button>
                  </div>
                </div>
              </div>

              {/* Right col — Result */}
              <div className="result-card">
                <div className="result-header">
                  <i className="fa fa-poll"></i>
                  <h2>Classification result</h2>
                </div>
                <div className="result-body">
                  {!result ? (
                    <div className="empty-state">
                      <i className="fa fa-file-image"></i>
                      <p>Upload a document and click<br/><strong>Classify document</strong> to see results.</p>
                    </div>
                  ) : (
                    <>
                      {/* Predicted class */}
                      <div className="result-class">
                        <div className="result-icon">
                          <i className={`fa ${classInfo.icon}`}></i>
                        </div>
                        <div>
                          <div className="result-class-name">
                            {result.predicted_class.replace("_", " ")}
                          </div>
                          <div className="result-model-used">
                            via {result.model_used}
                          </div>
                        </div>
                      </div>

                      {/* Confidence bar */}
                      <div className="confidence-section">
                        <div className="confidence-label">
                          <span>Confidence</span>
                          <span>{result.confidence.toFixed(2)}%</span>
                        </div>
                        <div className="confidence-bar-track">
                          <div
                            className={`confidence-bar-fill ${getBarClass(result.confidence)}`}
                            style={{width: `${result.confidence}%`}}
                          ></div>
                        </div>
                        <span className={`confidence-level-badge ${getConfidenceClass(result.confidence_level)}`}>
                          {result.confidence_level}
                        </span>
                      </div>

                      {/* All probabilities */}
                      <div className="all-probs">
                        <div className="prob-label">All class probabilities</div>
                        {Object.entries(result.all_probabilities)
                          .sort((a, b) => b[1] - a[1])
                          .map(([cls, pct]) => (
                            <div className="prob-row" key={cls}>
                              <span className="prob-name">{cls.replace("_", " ")}</span>
                              <div className="prob-track">
                                <div
                                  className={`prob-fill ${cls === result.predicted_class ? "winner" : ""}`}
                                  style={{width: `${pct}%`}}
                                ></div>
                              </div>
                              <span className="prob-pct">{pct.toFixed(2)}%</span>
                            </div>
                          ))
                        }
                      </div>

                      {/* Meta */}
                      <div style={{marginTop:"1.25rem", padding:"10px 12px", background:"#f7fafc", borderRadius:"8px", fontSize:"12px", color:"#718096"}}>
                        <div style={{display:"flex", justifyContent:"space-between"}}>
                          <span>File: {result.filename}</span>
                          <span>{new Date(result.timestamp).toLocaleTimeString()}</span>
                        </div>
                      </div>
                    </>
                  )}
                </div>
              </div>
            </div>

            {/* History */}
            {history.length > 0 && (
              <div className="history-card">
                <div className="history-header">
                  <h2><i className="fa fa-history"></i> Prediction history</h2>
                  <button className="clear-btn" onClick={() => setHistory([])}>Clear</button>
                </div>
                <table className="history-table">
                  <thead>
                    <tr>
                      <th>File</th>
                      <th>Predicted class</th>
                      <th>Confidence</th>
                      <th>Model</th>
                      <th>Time</th>
                    </tr>
                  </thead>
                  <tbody>
                    {history.map(h => {
                      const info = getClassInfo(h.predicted);
                      return (
                        <tr key={h.id}>
                          <td>{h.filename}</td>
                          <td>
                            <span className={`class-pill ${info.pillClass}`}>
                              <i className={`fa ${info.icon}`}></i>
                              {h.predicted.replace("_", " ")}
                            </span>
                          </td>
                          <td>{h.confidence.toFixed(2)}%</td>
                          <td>{h.model}</td>
                          <td>{h.time}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </main>

          {/* Toast */}
          {toast && (
            <div className="toast">
              <i className={`fa ${toast.icon}`}></i>
              {toast.msg}
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
